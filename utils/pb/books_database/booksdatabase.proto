syntax = "proto3";

package booksdatabase;
service BooksDatabase {
    rpc Read (ReadRequest) returns (ReadResponse);
    rpc Write (WriteRequest) returns (WriteResponse);
    rpc IncrementStock (IncrementStockRequest) returns (StockMutationResponse);
    rpc DecrementStock (DecrementStockRequest) returns (StockMutationResponse);
    rpc Prepare (PrepareRequest) returns (PrepareResponse);
    rpc Commit (CommitRequest) returns (CommitResponse);
    rpc Abort (AbortRequest) returns (AbortResponse);
}

message ReadRequest {
    string title = 1;
}

message ReadResponse {
    int32 stock = 1;
}

message WriteRequest {
    string title = 1;
    int32 new_stock = 2;
}

message WriteResponse {
    bool success = 1;
}

message StockReservation {
    string title = 1;
    int32 quantity = 2;
}

message IncrementStockRequest {
    string title = 1;
    int32 quantity = 2;
}

message DecrementStockRequest {
    string order_id = 1;
    repeated StockReservation reservations = 2;
}

message StockMutationResponse {
    bool success = 1;
    string message = 2;
    int32 stock = 3;
}

message PrepareRequest {
    string order_id = 1;
    repeated StockReservation reservations = 2;
}

message PrepareResponse {
    bool ready = 1;
    string message = 2;
}

message CommitRequest {
    string order_id = 1;
}

message CommitResponse {
    bool success = 1;
    string message = 2;
}

message AbortRequest {
    string order_id = 1;
}

message AbortResponse {
    bool aborted = 1;
}