syntax = "proto3";

package suggestions;

service SuggestionsService {
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);

    // Explicit event RPC for checkout flow (f)
    rpc GenerateSuggestions (OrderEventRequest) returns (OrderEventResponse);

    // orchestrator broadcasts final cleanup after checkout flow ends
    rpc CleanupOrder (CleanupOrderRequest) returns (CleanupOrderResponse);
}

message InitOrderRequest {
    string order_id = 1;
    string order_payload_json = 2;
    repeated int32 vector_clock = 3;
}

message InitOrderResponse {
    bool acknowledged = 1;
}

message BookSuggestion {
    string title = 1;
    string author = 2;
}

message OrderEventRequest {
    string order_id = 1;
    repeated int32 incoming_vc = 2;
}

message OrderEventResponse {
    bool fail = 1;
    string message = 2;
    repeated int32 vc = 3;
    repeated BookSuggestion suggestions = 4;
}

message CleanupOrderRequest {
    string order_id = 1;
    repeated int32 final_vector_clock = 2;
}

message CleanupOrderResponse {
    bool cleaned = 1;
    bool vc_valid = 2;
    string message = 3;
    repeated int32 local_vector_clock = 4;
}